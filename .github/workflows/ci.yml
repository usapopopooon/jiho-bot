name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Lint only needs ruff — skip the heavy ``[dev,gen]`` extras (discord.py,
      # aiohttp, pytest, …) so this job finishes in a few seconds and runs in
      # parallel with ``test``.
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff~=0.9.0

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check src tests scripts

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,gen]'

      - name: Pytest
        run: pytest -q
