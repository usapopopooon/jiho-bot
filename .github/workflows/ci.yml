name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,gen]'

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Pytest
        run: pytest -q
